name: Browser Test (optional)

# Real-browser runtime check for the binary PAddOn protocol — it exercises the GWT terminal, the one
# protocol decoder that exists only as compiled JavaScript and cannot be unit-tested in the JVM.
#
# This is a SEPARATE, NON-REQUIRED workflow on purpose: a failure here is visible but does not block
# the main "CI" build or PR merges (unless a maintainer explicitly marks it as a required check).

on:
  push:
  pull_request:

jobs:
  browser:
    name: Binary addon — real browser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: GWT compile + sample build
        run: ./gradlew :ponysdk:gwtc :sample:classes :sample:processResources --no-configuration-cache --stacktrace

      - name: Stage the GWT terminal for the showcase
        run: |
          mkdir -p sample/build/gwt
          cp -r ponysdk/build/gwt/gwt sample/build/gwt/gwt

      - name: Start the showcase server (background)
        run: |
          nohup ./gradlew :sample:runShowcase --no-configuration-cache > showcase.log 2>&1 &
          for i in $(seq 1 120); do
            curl -sf http://localhost:8081/sample/ >/dev/null 2>&1 && { echo "server up after ${i}s"; break; }
            sleep 1
          done

      - name: Run the binary-addon browser test
        run: >-
          ./gradlew :ponysdk:test
          --tests "com.ponysdk.driver.BinaryAddonBrowserIT"
          -Dponysdk.browserTest=true
          --no-configuration-cache --stacktrace

      - name: Showcase server log
        if: always()
        run: cat showcase.log || true
