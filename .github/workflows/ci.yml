name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build & Test (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, GWT compile and test
        run: ./gradlew build --stacktrace

  e2e:
    name: FlexLayout E2E (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: sample
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start FlexLayout demo server
        run: |
          ./gradlew :sample:processResources :sample:runFlexLayoutDemo &
          echo $! > server.pid
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/sample/ > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done

      - name: E2E Tests (Playwright)
        working-directory: sample
        env:
          BASE_URL: 'http://localhost:8081/sample/'
        run: npx playwright test tests/flexlayout.spec.js --retries=2 --ignore-snapshots

      - name: Stop server
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: sample/test-results/

  publish:
    name: Publish Snapshot
    needs: build
    # Only publish on direct pushes to the main / release branches (never on PRs)
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' ||
       github.ref == 'refs/heads/v3.x')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish
        env:
          USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish
