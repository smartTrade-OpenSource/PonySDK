name: CI

on:
  push:
    branches: ['master', 'v2.8.x']
  pull_request:
    branches: ['master']

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build
        run: ./gradlew :sample:compileJava --no-daemon

      - name: Unit Tests (JUnit)
        run: ./gradlew :sample:test --no-daemon

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: sample
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start sample server
        run: |
          ./gradlew :sample:processResources :sample:runSampleSpring --no-daemon &
          echo $! > server.pid
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/sample/ > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done

      - name: E2E Tests (Playwright)
        working-directory: sample
        env:
          BASE_URL: 'http://localhost:8081/sample/'
        run: npx playwright test tests/flexlayout.spec.js --retries=2 --ignore-snapshots

      - name: Stop server
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: sample/test-results/

  publish:
    name: Publish Snapshot
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Publish
        env:
          USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --no-daemon
