plugins {
    id 'jacoco'
}
ext {
    resourcesCoreTest = "src/test/resources"
    gwtOutputDirName = layout.buildDirectory.dir("gwt").get().asFile.path
    jsinteropVersion = '1.0.2'
    seleniumVersion = '4.44.0'
    junitVersion = '4.13.2'
    tyrusVersion = '2.2.2'
    mockitoVersion = '5.23.0'
    gwtVersion = '2.13.0'
    elemental2Version = '1.3.2'
    jettyVersion = '12.1.10'
    slf4jVersion = '2.0.18'
    log4jVersion = '2.26.0'
    jakartaServletVersion = '6.1.0'
    jakartaJsonVersion = '2.1.3'
    parssonVersion = '1.1.9'
    jakartaValidationVersion = '3.1.1'
    otelVersion = '1.63.0'
    // brotli4j native version brought transitively by jetty-compression-brotli (keep in sync)
    brotli4jVersion = '1.23.0'
}

def versionSuffix = project.hasProperty('BUILD_RELEASE') ? "" : "-SNAPSHOT"
group = 'com.ponysdk'
version = '2.8.99.6' + versionSuffix

publishing {
    publications {
        maven(MavenPublication) {
            artifactId = 'ponysdk'
            from components.java
        }
    }

    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/smartTrade-OpenSource/PonySDK")
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}

// Code excluded from coverage metrics & gate (not unit-testable / not product logic):
//  - GWT terminal: transpiled to JavaScript, runs in the browser — not executable by JVM unit tests
//  - test harness shipped in main (com.ponysdk.test.*): test-support code, not product logic
def coverageExclusions = [
        'com/ponysdk/core/terminal/**',
        'com/ponysdk/test/**',
]

jacocoTestReport {
    reports {
        xml.required = true
        xml.outputLocation = layout.buildDirectory.file("reports/jacoco/report.xml")
        html.required = false
        csv.required = false
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: coverageExclusions)
        }))
    }
}

// Progressive coverage gate. Thresholds sit just below the current verified ratios so the build
// passes today; raise them incrementally as coverage improves (ratchet — never lower them).
jacocoTestCoverageVerification {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: coverageExclusions)
        }))
    }
    violationRules {
        // Whole-module floor (over the testable code; terminal + test harness are excluded above).
        rule {
            limit {
                counter = 'INSTRUCTION'
                value = 'COVEREDRATIO'
                minimum = 0.30
            }
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.28
            }
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.20
            }
        }
        // Per-package ratchets on the critical server packages: pin current line coverage so it
        // cannot silently regress. Raise these minimums as coverage improves (never lower them).
        rule {
            element = 'PACKAGE'
            includes = ['com.ponysdk.core.server.application']
            limit { counter = 'LINE'; value = 'COVEREDRATIO'; minimum = 0.75 }
        }
        rule {
            element = 'PACKAGE'
            includes = ['com.ponysdk.core.server.websocket']
            limit { counter = 'LINE'; value = 'COVEREDRATIO'; minimum = 0.60 }
        }
        rule {
            element = 'PACKAGE'
            includes = ['com.ponysdk.core.server.servlet']
            limit { counter = 'LINE'; value = 'COVEREDRATIO'; minimum = 0.65 }
        }
        rule {
            element = 'PACKAGE'
            includes = ['com.ponysdk.core.server.concurrent']
            limit { counter = 'LINE'; value = 'COVEREDRATIO'; minimum = 0.70 }
        }
    }
}

configurations {
    gwt
    gwtdev
    implementation.extendsFrom gwt
}

dependencies {
    gwt(
            'org.gwtproject:gwt-user:' + gwtVersion,
            'com.google.elemental2:elemental2-dom:' + elemental2Version,
            'com.google.elemental2:elemental2-core:' + elemental2Version,
            'com.google.elemental2:elemental2-webstorage:' + elemental2Version
    )

    gwtdev(
            'org.gwtproject:gwt-dev:' + gwtVersion
    )

    implementation(
            'jakarta.validation:jakarta.validation-api:' + jakartaValidationVersion,
            // OpenTelemetry API — metrics + trace (no SDK, user brings their own)
            'io.opentelemetry:opentelemetry-api:' + otelVersion,
            'com.google.jsinterop:jsinterop:' + jsinteropVersion,
            'com.google.jsinterop:jsinterop-annotations:' + jsinteropVersion,
            'org.eclipse.jetty:jetty-server:' + jettyVersion,
            'org.eclipse.jetty.ee11:jetty-ee11-servlet:' + jettyVersion,
            'org.eclipse.jetty.ee11:jetty-ee11-webapp:' + jettyVersion,
            'org.eclipse.jetty.ee11:jetty-ee11-servlets:' + jettyVersion,
            'org.eclipse.jetty:jetty-client:' + jettyVersion,
            'org.eclipse.jetty:jetty-io:' + jettyVersion,
            'org.eclipse.jetty:jetty-util:' + jettyVersion,
            'org.eclipse.jetty:jetty-http:' + jettyVersion,
            'org.eclipse.jetty:jetty-security:' + jettyVersion,
            'org.eclipse.jetty.websocket:jetty-websocket-jetty-api:' + jettyVersion,
            'org.eclipse.jetty.ee11.websocket:jetty-ee11-websocket-jetty-server:' + jettyVersion,
            'org.eclipse.jetty.compression:jetty-compression-server:' + jettyVersion,
            'org.eclipse.jetty.compression:jetty-compression-gzip:' + jettyVersion,
            'org.eclipse.jetty.compression:jetty-compression-brotli:' + jettyVersion,
            'org.slf4j:slf4j-api:' + slf4jVersion,
            'jakarta.servlet:jakarta.servlet-api:' + jakartaServletVersion,
            'jakarta.json:jakarta.json-api:' + jakartaJsonVersion,
            'org.eclipse.parsson:parsson:' + parssonVersion,
            'org.seleniumhq.selenium:selenium-api:' + seleniumVersion,
            'org.glassfish.tyrus:tyrus-client:' + tyrusVersion,
            'org.glassfish.tyrus.ext:tyrus-extension-deflate:' + tyrusVersion,
            'junit:junit:' + junitVersion,
            'org.mockito:mockito-core:' + mockitoVersion
    )

    testImplementation(
            'org.seleniumhq.selenium:selenium-java:' + seleniumVersion,
            'jakarta.websocket:jakarta.websocket-client-api:2.2.0',
            'org.jsoup:jsoup:1.22.2',
            'org.junit.jupiter:junit-jupiter-api:5.14.4',
            'org.junit.jupiter:junit-jupiter-engine:5.14.4',
            'org.junit.platform:junit-platform-engine:1.14.4',
            'org.junit.platform:junit-platform-launcher:1.14.4'
    )

    // Brotli native libraries (brotli4j) for the common server + dev platforms.
    // Optional at runtime: PonySDKServer registers Brotli only when the native is loadable
    // (Brotli4jLoader.isAvailable()), otherwise it degrades gracefully to gzip.
    runtimeOnly(
            'com.aayushatharva.brotli4j:native-linux-x86_64:' + brotli4jVersion,
            'com.aayushatharva.brotli4j:native-linux-aarch64:' + brotli4jVersion,
            'com.aayushatharva.brotli4j:native-osx-aarch64:' + brotli4jVersion,
            'com.aayushatharva.brotli4j:native-osx-x86_64:' + brotli4jVersion
    )

    testRuntimeOnly(
            'org.slf4j:jcl-over-slf4j:' + slf4jVersion,
            'org.slf4j:jul-to-slf4j:' + slf4jVersion,
            'org.apache.logging.log4j:log4j-slf4j2-impl:' + log4jVersion,
            'org.glassfish.tyrus:tyrus-container-grizzly-client:' + tyrusVersion
    )
}

java {
    withJavadocJar()
    withSourcesJar()
}

javadoc {
    classpath += configurations.gwtdev
    exclude '**/terminal/**'
}

jar {
    into('ponyterminal') {
        from gwtOutputDirName + '/gwt/ponyterminal'
    }
    exclude('*.devmode.js')
    exclude('*compilation-mappings.txt')

    def builtBy = providers.systemProperty('user.name')
    def javaVersion = providers.systemProperty('java.version')
    def javaVendor = providers.systemProperty('java.vendor')
    def javaVmVersion = providers.systemProperty('java.vm.version')
    def osName = providers.systemProperty('os.name')
    def osArch = providers.systemProperty('os.arch')
    def osVersion = providers.systemProperty('os.version')
    def gradleVer = GradleVersion.current().version

    manifest {
        attributes(
                'Built-By': builtBy,
                'Build-Timestamp': new java.text.SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss.SSSZ").format(new Date()),
                'Created-By': "Gradle ${gradleVer}",
                'Build-Jdk': javaVersion.map { v -> "${v} (${javaVendor.get()} ${javaVmVersion.get()})" },
                'Build-OS': osName.map { n -> "${n} ${osArch.get()} ${osVersion.get()}" },
                'License-Title': "Apache License 2.0"
        )
    }
}

task gwtc(type: JavaExec) {
    inputs.dir('src/main/java/com/ponysdk/core/terminal')
    outputs.dir(gwtOutputDirName + '/gwt/ponyterminal')
    description = "GWT compile to JavaScript (production mode)"
    mainClass = 'com.google.gwt.dev.Compiler'
    workingDir = new File(gwtOutputDirName)
    classpath { [sourceSets.main.java.srcDirs, configurations.gwtdev, configurations.gwt] }
    maxHeapSize = '512M'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    args = [
            '-war',
            'gwt',
            '-localWorkers',
            Runtime.getRuntime().availableProcessors(),
            '-sourceLevel',
            '17',
            'com.ponysdk.core.PonyTerminal',
            '-generateJsInteropExports'
    ]
}

test {
    classpath = files(resourcesCoreTest, gwtOutputDirName) + classpath
    // Brotli compression tests load a native lib (brotli4j); JDK 24+ (JEP 472) warns on native access
    // now and will block it later unless explicitly granted.
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    // Forward opt-in browser-test properties to the forked test JVM (see driver/BinaryAddonBrowserIT)
    ['ponysdk.browserTest', 'ponysdk.browserUrl', 'ponysdk.chromeBinary', 'webdriver.chrome.driver'].each { k ->
        if (System.getProperty(k) != null) systemProperty k, System.getProperty(k)
    }
    addTestListener(new TestListener() {
        @Override void beforeSuite(TestDescriptor descriptor) {}
        @Override void beforeTest(TestDescriptor descriptor) {}
        @Override void afterTest(TestDescriptor descriptor, TestResult result) {}
        @Override void afterSuite(TestDescriptor descriptor, TestResult result) {
            if (descriptor.parent == null) {
                println "Results: ${result.resultType} (${result.testCount} tests, ${result.successfulTestCount} successes, ${result.failedTestCount} failures, ${result.skippedTestCount} skipped)"
            }
        }
    })
}

check.dependsOn jacocoTestReport, jacocoTestCoverageVerification
gwtc.dependsOn classes
jar.dependsOn gwtc
// test classpath includes the GWT output dir (gwtOutputDirName), so it must run after gwtc
test.dependsOn gwtc
publish.dependsOn check
